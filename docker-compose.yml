# Local Postgres — docs/ROADMAP.md §19
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jerseystats
      POSTGRES_PASSWORD: jerseystats
      POSTGRES_DB: jerseystats
    ports:
      - "5432:5432"
    volumes:
      - jerseystats_pg:/var/lib/postgresql/data

volumes:
  jerseystats_pg:
